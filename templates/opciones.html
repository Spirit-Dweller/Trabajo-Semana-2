<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Panel de opciones - Producto o Login</title>
    <style>
        /* (Mantén todos los estilos que ya tenías) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            padding: 2rem 2rem 2.5rem 2rem;
            text-align: center;
        }

        h1 {
            font-size: 1.95rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f2b3c, #2a3f5e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
        }

        .subtitulo {
            font-size: 1.05rem;
            color: #4a5b6e;
            margin-bottom: 2.2rem;
            border-bottom: 1px solid #e2e8f0;
            display: inline-block;
            padding-bottom: 0.4rem;
        }

        .botones-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin: 2rem 0 2rem 0;
        }

        .btn {
            border: none;
            font-weight: 600;
            font-size: 1.2rem;
            padding: 1rem 2rem;
            min-width: 200px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-producto {
            background: linear-gradient(110deg, #0f2b3d, #1b4a6e);
            color: white;
            box-shadow: 0 8px 18px rgba(27, 74, 110, 0.25);
        }

        .btn-producto:hover {
            background: linear-gradient(110deg, #1a3f58, #235f8a);
            transform: translateY(-3px);
        }

        .btn-login {
            background: linear-gradient(110deg, #2c3e4e, #3e5a6f);
            color: white;
            box-shadow: 0 8px 18px rgba(62, 90, 111, 0.25);
        }

        .btn-login:hover {
            background: linear-gradient(110deg, #3c5568, #4f6f89);
            transform: translateY(-3px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .respuesta-area {
            margin-top: 1.8rem;
            padding: 1rem 1.2rem;
            background: #f8fafc;
            border-radius: 1.5rem;
            border-left: 5px solid #5f8ab6;
            text-align: left;
            transition: all 0.2s;
        }

        .mensaje-respuesta {
            font-size: 1rem;
            color: #0f172a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .icono-respuesta {
            font-size: 1.7rem;
        }

        .texto-respuesta {
            flex: 1;
            line-height: 1.4;
        }

        .respuesta-area.sin-eleccion {
            background: #f1f3f7;
            border-left-color: #b9c8e6;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #cbd5e1;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-top: 0.8rem;
            cursor: pointer;
            color: #475569;
            font-weight: 500;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: #eef2ff;
            border-color: #94a3b8;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 550px) {
            .card { padding: 1.5rem; }
            .btn { min-width: 160px; padding: 0.8rem 1.2rem; font-size: 1rem; }
            h1 { font-size: 1.6rem; }
            .botones-container { gap: 1rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>📦 Acceso rápido</h1>
    <div class="subtitulo">¿Qué deseas hacer?</div>

    <div class="botones-container">
        <button id="btnIngresarProducto" class="btn btn-producto">
            ✨ Ingresar Producto
        </button>
        <button id="btnHacerLogin" class="btn btn-login">
            🔐 Hacer Login
        </button>
    </div>

    <div id="respuestaContainer" class="respuesta-area sin-eleccion">
        <div class="mensaje-respuesta">
            <span class="icono-respuesta">🖱️</span>
            <span class="texto-respuesta placeholder">
                Esperando tu decisión... presiona uno de los botones.
            </span>
        </div>
    </div>

    <button id="resetMensajeBtn" class="reset-btn">
        🔄 Limpiar elección
    </button>
</div>

<script>
    const btnProducto = document.getElementById('btnIngresarProducto');
    const btnLogin = document.getElementById('btnHacerLogin');
    const respuestaContainer = document.getElementById('respuestaContainer');
    const resetBtn = document.getElementById('resetMensajeBtn');

    function mostrarMensaje(tipo, mensajePersonalizado = null) {
        respuestaContainer.classList.remove('sin-eleccion');
        
        let contenidoHTML = '';
        
        if (tipo === 'producto') {
            contenidoHTML = `
                <div class="mensaje-respuesta">
                    <span class="icono-respuesta">📦➕</span>
                    <span class="texto-respuesta">
                        <strong>Has seleccionado: Ingresar Producto</strong><br>
                        ${mensajePersonalizado || 'Procesando solicitud...'}
                    </span>
                </div>
            `;
        } 
        else if (tipo === 'login') {
            contenidoHTML = `
                <div class="mensaje-respuesta">
                    <span class="icono-respuesta">🔑👤</span>
                    <span class="texto-respuesta">
                        <strong>Has seleccionado: Hacer Login</strong><br>
                        ${mensajePersonalizado || 'Procesando solicitud...'}
                    </span>
                </div>
            `;
        }
        else if (tipo === 'reset') {
            respuestaContainer.classList.add('sin-eleccion');
            contenidoHTML = `
                <div class="mensaje-respuesta">
                    <span class="icono-respuesta">🖱️</span>
                    <span class="texto-respuesta placeholder">
                        Esperando tu decisión... presiona uno de los botones.
                    </span>
                </div>
            `;
        }
        
        respuestaContainer.innerHTML = contenidoHTML;
    }

    function mostrarLoading(boton) {
        const textoOriginal = boton.innerHTML;
        boton.innerHTML = '<span class="loading"></span> Procesando...';
        boton.disabled = true;
        return textoOriginal;
    }

    function restaurarBoton(boton, textoOriginal) {
        boton.innerHTML = textoOriginal;
        boton.disabled = false;
    }

    async function enviarOpcion(opcion, boton) {
        const textoOriginal = mostrarLoading(boton);
        
        try {
            const response = await fetch('/procesar-opcion', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ opcion: opcion })
            });
            
            const data = await response.json();
            
            if (data.status === 'success') {
                mostrarMensaje(opcion, data.mensaje);
                
                // Si hay redirección, esperar un momento y redirigir
                if (data.redirect) {
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1500);
                }
            } else {
                mostrarMensaje(opcion, `❌ Error: ${data.mensaje}`);
            }
        } catch (error) {
            console.error('Error:', error);
            mostrarMensaje(opcion, '❌ Error de conexión con el servidor');
        } finally {
            restaurarBoton(boton, textoOriginal);
        }
    }

    btnProducto.addEventListener('click', () => {
        enviarOpcion('producto', btnProducto);
    });

    btnLogin.addEventListener('click', () => {
        enviarOpcion('login', btnLogin);
    });

    resetBtn.addEventListener('click', () => {
        mostrarMensaje('reset');
    });
</script>
</body>
</html>
